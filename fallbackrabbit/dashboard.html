<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FallbackRabbit Dashboard</title>
<style>
  :root {
    --bg: #0a0c10; --bg-elevated: #10131a; --surface: #161923; --surface-hover: #1c2030;
    --border: #252a3a; --border-subtle: #1e2234;
    --text: #e4e7f0; --text-secondary: #9ba2b8; --text-dim: #6b7394;
    --primary: #7c6ff7; --primary-hover: #8b80fa; --primary-glow: rgba(124,111,247,0.2); --primary-muted: rgba(124,111,247,0.08);
    --success: #34d399; --success-muted: rgba(52,211,153,0.12);
    --warning: #fbbf24; --warning-muted: rgba(251,191,36,0.12);
    --danger: #f87171; --danger-muted: rgba(248,113,113,0.12);
    --info: #60a5fa; --info-muted: rgba(96,165,250,0.12);
    --radius: 10px; --radius-sm: 6px; --radius-lg: 14px;
    --font: 'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
    --font-mono: 'JetBrains Mono','Fira Code','Cascadia Code',monospace;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.3); --shadow-md: 0 4px 12px rgba(0,0,0,0.4); --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
    --shadow-glow: 0 0 20px rgba(124,111,247,0.15);
    --transition: 0.2s cubic-bezier(0.4,0,0.2,1); --transition-slow: 0.35s cubic-bezier(0.4,0,0.2,1);
  }
  *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
  html { font-size:15px; }
  body { font-family:var(--font); background:var(--bg); color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased; }
  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  .app { display:flex; min-height:100vh; }
  .sidebar { width:260px; background:var(--bg-elevated); border-right:1px solid var(--border-subtle); padding:24px 14px; flex-shrink:0; display:flex; flex-direction:column; position:sticky; top:0; height:100vh; overflow-y:auto; }
  .main { flex:1; padding:32px 40px; overflow-y:auto; min-height:100vh; background:linear-gradient(180deg,var(--bg) 0%,var(--bg-elevated) 100%); }
  .logo { font-size:21px; font-weight:800; margin-bottom:32px; display:flex; align-items:center; gap:10px; padding:0 8px; letter-spacing:-0.3px; }
  .logo-icon { width:32px; height:32px; background:linear-gradient(135deg,var(--primary) 0%,#a78bfa 100%); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:18px; }
  .logo-text span { color:var(--primary); }
  .nav-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1.2px; color:var(--text-dim); padding:0 12px; margin-bottom:6px; margin-top:16px; }
  .nav-item { display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:var(--radius-sm); cursor:pointer; transition:all var(--transition); color:var(--text-secondary); font-size:13.5px; font-weight:500; position:relative; }
  .nav-item:hover { background:var(--primary-muted); color:var(--text); }
  .nav-item.active { background:var(--primary-muted); color:var(--primary); font-weight:600; }
  .nav-item.active::before { content:''; position:absolute; left:0; top:50%; transform:translateY(-50%); width:3px; height:18px; background:var(--primary); border-radius:0 3px 3px 0; }
  .nav-icon { font-size:16px; width:22px; text-align:center; }
  .sidebar-footer { margin-top:auto; padding-top:16px; border-top:1px solid var(--border-subtle); }
  .mobile-header { display:none; padding:12px 16px; background:var(--bg-elevated); border-bottom:1px solid var(--border-subtle); align-items:center; justify-content:space-between; }
  .hamburger { background:none; border:none; color:var(--text); font-size:24px; cursor:pointer; padding:4px; }
  .ws-status { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--text-dim); padding:8px 12px; }
  .ws-dot { width:8px; height:8px; border-radius:50%; transition:background var(--transition); }
  .ws-dot.connected { background:var(--success); box-shadow:0 0 8px rgba(52,211,153,0.4); }
  .ws-dot.disconnected { background:var(--danger); }
  .ws-dot.connecting { background:var(--warning); animation:pulse-dot 1.5s ease-in-out infinite; }
  @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:28px; }
  .page-title { font-size:26px; font-weight:800; letter-spacing:-0.5px; }
  .page-subtitle { font-size:13px; color:var(--text-dim); margin-top:4px; }
  .card { background:var(--surface); border:1px solid var(--border-subtle); border-radius:var(--radius-lg); padding:24px; margin-bottom:16px; transition:all var(--transition); }
  .card:hover { border-color:var(--border); }
  .card-title { font-size:15px; font-weight:700; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
  .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; margin-bottom:28px; }
  .stat-card { background:var(--surface); border:1px solid var(--border-subtle); border-radius:var(--radius); padding:20px; transition:all var(--transition); position:relative; overflow:hidden; }
  .stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--primary); opacity:0; transition:opacity var(--transition); }
  .stat-card:hover::before { opacity:1; }
  .stat-card:hover { border-color:var(--border); transform:translateY(-1px); }
  .stat-value { font-size:32px; font-weight:800; letter-spacing:-1px; }
  .stat-label { font-size:12px; color:var(--text-dim); margin-top:4px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }
  .table-wrap { overflow-x:auto; margin:0 -4px; }
  table { width:100%; border-collapse:separate; border-spacing:0; font-size:13.5px; }
  th { padding:10px 16px; text-align:left; color:var(--text-dim); font-weight:700; font-size:11px; text-transform:uppercase; letter-spacing:0.8px; border-bottom:1px solid var(--border); background:var(--surface); }
  td { padding:12px 16px; color:var(--text); border-bottom:1px solid var(--border-subtle); transition:background var(--transition); }
  tr:hover td { background:var(--primary-muted); }
  .mono { font-family:var(--font-mono); font-size:12px; color:var(--text-secondary); }
  .badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; letter-spacing:0.3px; }
  .badge-success { background:var(--success-muted); color:var(--success); }
  .badge-warning { background:var(--warning-muted); color:var(--warning); }
  .badge-danger { background:var(--danger-muted); color:var(--danger); }
  .badge-info { background:var(--info-muted); color:var(--info); }
  .badge-primary { background:var(--primary-muted); color:var(--primary); }
  .btn { padding:9px 18px; border-radius:var(--radius-sm); border:none; font-size:13px; font-weight:600; cursor:pointer; transition:all var(--transition); display:inline-flex; align-items:center; gap:6px; font-family:var(--font); }
  .btn:active { transform:scale(0.97); }
  .btn-primary { background:var(--primary); color:white; box-shadow:0 2px 8px rgba(124,111,247,0.3); }
  .btn-primary:hover { background:var(--primary-hover); box-shadow:0 4px 16px rgba(124,111,247,0.4); }
  .btn-outline { background:transparent; border:1px solid var(--border); color:var(--text-secondary); }
  .btn-outline:hover { border-color:var(--primary); color:var(--primary); }
  .btn-ghost { background:transparent; color:var(--text-secondary); }
  .btn-ghost:hover { background:var(--primary-muted); color:var(--primary); }
  .btn-sm { padding:5px 12px; font-size:12px; }
  .btn-danger { background:var(--danger-muted); color:var(--danger); border:1px solid transparent; }
  .btn-danger:hover { background:var(--danger); color:white; }
  .btn-icon { width:34px; height:34px; padding:0; justify-content:center; border-radius:var(--radius-sm); background:transparent; color:var(--text-dim); border:1px solid var(--border-subtle); }
  .btn-icon:hover { background:var(--primary-muted); color:var(--primary); border-color:var(--primary); }
  .form-group { margin-bottom:18px; }
  .form-label { display:block; font-size:12px; font-weight:700; margin-bottom:6px; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.5px; }
  .form-input { width:100%; padding:10px 14px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--bg-elevated); color:var(--text); font-size:14px; font-family:var(--font); transition:all var(--transition); }
  .form-input:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-muted); }
  .form-input::placeholder { color:var(--text-dim); }
  textarea.form-input { min-height:100px; resize:vertical; font-family:var(--font-mono); font-size:12.5px; }
  select.form-input { cursor:pointer; }
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; z-index:1000; animation:fadeIn 0.2s ease forwards; }
  @keyframes fadeIn { to{opacity:1} }
  @keyframes slideUp { from{transform:translateY(16px);opacity:0} to{transform:translateY(0);opacity:1} }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:28px; width:90%; max-width:620px; max-height:85vh; overflow-y:auto; animation:slideUp 0.25s ease forwards; box-shadow:var(--shadow-lg); }
  .modal-title { font-size:20px; font-weight:800; margin-bottom:24px; letter-spacing:-0.3px; }
  .modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:24px; }
  .toast-container { position:fixed; top:20px; right:20px; z-index:2000; display:flex; flex-direction:column; gap:8px; }
  .toast { padding:12px 20px; border-radius:var(--radius-sm); font-size:13px; font-weight:500; animation:slideRight 0.3s ease forwards; box-shadow:var(--shadow-md); display:flex; align-items:center; gap:8px; }
  .toast-success { background:#065f46; color:var(--success); border:1px solid rgba(52,211,153,0.3); }
  .toast-error { background:#7f1d1d; color:var(--danger); border:1px solid rgba(248,113,113,0.3); }
  .toast-info { background:#1e3a5f; color:var(--info); border:1px solid rgba(96,165,250,0.3); }
  @keyframes slideRight { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }
  @keyframes slideOut { from{transform:translateX(0);opacity:1} to{transform:translateX(100%);opacity:0} }
  .progress-bar { height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
  .progress-fill { height:100%; border-radius:3px; background:linear-gradient(90deg,var(--primary),#a78bfa); transition:width 0.4s cubic-bezier(0.4,0,0.2,1); }
  .test-log { font-family:var(--font-mono); font-size:12px; line-height:1.8; color:var(--text-secondary); max-height:420px; overflow-y:auto; padding:16px; background:var(--bg); border-radius:var(--radius-sm); border:1px solid var(--border-subtle); }
  .test-log .success { color:var(--success); }
  .test-log .fail { color:var(--danger); }
  .test-log .info { color:var(--info); }
  .empty-state { text-align:center; padding:64px 24px; color:var(--text-dim); }
  .empty-state .icon { font-size:56px; margin-bottom:16px; opacity:0.5; }
  .empty-state .title { font-size:18px; font-weight:700; color:var(--text-secondary); margin-bottom:8px; }
  .empty-state .desc { font-size:14px; max-width:320px; margin:0 auto 20px; line-height:1.6; }
  .chain-card { background:var(--surface); border:1px solid var(--border-subtle); border-radius:var(--radius-lg); padding:20px; margin-bottom:12px; transition:all var(--transition); cursor:pointer; }
  .chain-card:hover { border-color:var(--border); transform:translateY(-1px); box-shadow:var(--shadow-md); }
  .chain-card.active { border-color:var(--primary); box-shadow:var(--shadow-glow); }
  .chain-card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
  .chain-card-title { font-size:16px; font-weight:700; }
  .chain-card-meta { display:flex; gap:16px; font-size:12px; color:var(--text-dim); }
  .chain-card-meta span { display:flex; align-items:center; gap:4px; }
  .chain-card-actions { display:flex; gap:4px; opacity:0; transition:opacity var(--transition); }
  .chain-card:hover .chain-card-actions { opacity:1; }
  .provider-pills { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
  .provider-pill { font-size:11px; padding:3px 10px; border-radius:20px; background:var(--primary-muted); color:var(--primary); font-weight:600; letter-spacing:0.3px; }
  .export-output { margin-top:16px; font-size:12px; color:var(--text-secondary); background:var(--bg); padding:20px; border-radius:var(--radius-sm); max-height:440px; overflow:auto; font-family:var(--font-mono); border:1px solid var(--border-subtle); position:relative; }
  .copy-btn { position:absolute; top:10px; right:10px; }
  @media(max-width:768px) {
    .sidebar { position:fixed; left:-280px; top:0; bottom:0; z-index:100; transition:left var(--transition-slow); box-shadow:var(--shadow-lg); }
    .sidebar.open { left:0; }
    .mobile-header { display:flex; }
    .main { padding:16px; }
    .stats { grid-template-columns:repeat(2,1fr); }
    .page-title { font-size:22px; }
    .modal { width:95%; padding:20px; }
  }
  .backdrop { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:99; }
  .backdrop.open { display:block; }
</style>
</head>
<body>
<div class="toast-container" id="toastContainer"></div>
<div class="mobile-header">
  <button class="hamburger" onclick="toggleSidebar()">&#9776;</button>
  <div style="font-weight:700;font-size:16px;">&#x1F430; <span style="color:var(--primary)">Fallback</span>Rabbit</div>
  <div style="width:32px"></div>
</div>
<div class="backdrop" id="backdrop" onclick="toggleSidebar()"></div>

<div class="app">
  <nav class="sidebar" id="sidebar">
    <div class="logo">
      <div class="logo-icon">&#x1F430;</div>
      <div class="logo-text"><span>Fallback</span>Rabbit</div>
    </div>
    <div class="nav-label">Core</div>
    <div class="nav-item active" data-page="overview" onclick="navigateTo('overview')">
      <span class="nav-icon">&#x1F4CA;</span> Overview
    </div>
    <div class="nav-item" data-page="chains" onclick="navigateTo('chains')">
      <span class="nav-icon">&#x1F517;</span> Chains
    </div>
    <div class="nav-item" data-page="test" onclick="navigateTo('test')">
      <span class="nav-icon">&#x1F9EA;</span> Test Runner
    </div>
    <div class="nav-item" data-page="export" onclick="navigateTo('export')">
      <span class="nav-icon">&#x1F4E6;</span> Export
    </div>
    <div class="sidebar-footer">
      <div class="ws-status">
        <div class="ws-dot disconnected" id="wsDot"></div>
        <span id="wsLabel">Disconnected</span>
      </div>
    </div>
  </nav>

  <main class="main" id="mainContent"></main>
</div>

<script>
const API = '';
let chains = [];
let ws = null;
let currentPage = 'overview';
let selectedChainId = null;

function showToast(msg, type='info') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  const icons = {success:'\u2713', error:'\u2717', info:'\u2139'};
  t.className = 'toast toast-' + type;
  t.textContent = (icons[type]||'') + ' ' + msg;
  c.appendChild(t);
  setTimeout(() => { t.style.animation = 'slideOut 0.3s ease forwards'; setTimeout(() => t.remove(), 300); }, 3500);
}
function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('backdrop').classList.toggle('open');
}
async function api(path, opts = {}) {
  const res = await fetch(API + path, opts);
  if (!res.ok) { const err = await res.json().catch(() => ({detail:res.statusText})); throw new Error(err.detail||res.statusText); }
  return res.json();
}
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const dot = document.getElementById('wsDot');
  const label = document.getElementById('wsLabel');
  dot.className = 'ws-dot connecting';
  label.textContent = 'Connecting...';
  try { ws = new WebSocket(`${proto}://${location.host}/ws`); } catch { setTimeout(connectWS, 5000); return; }
  ws.onopen = () => { dot.className = 'ws-dot connected'; label.textContent = 'Connected'; };
  ws.onclose = () => { dot.className = 'ws-dot disconnected'; label.textContent = 'Disconnected'; setTimeout(connectWS, 3000); };
  ws.onmessage = (e) => { handleWSEvent(JSON.parse(e.data)); };
  ws.onerror = () => ws.close();
}
function handleWSEvent(ev) {
  if (ev.type === 'test_progress' && currentPage === 'test') appendTestLog(ev.data);
  if (ev.type === 'test_complete' && currentPage === 'test') showTestComplete(ev.data);
  if (ev.type === 'chain_created' || ev.type === 'chain_deleted') loadChains();
}
function navigateTo(page) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelector(`.nav-item[data-page="${page}"]`).classList.add('active');
  currentPage = page;
  if (page !== 'test') selectedChainId = null;
  renderPage();
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('backdrop').classList.remove('open');
}
async function loadChains() { try { chains = await api('/chains'); } catch { chains = []; } renderPage(); }

function renderPage() {
  const el = document.getElementById('mainContent');
  switch(currentPage) {
    case 'overview': renderOverview(el); break;
    case 'chains': renderChains(el); break;
    case 'test': renderTest(el); break;
    case 'export': renderExport(el); break;
  }
}

function renderOverview(el) {
  const tc = chains.length;
  const tp = chains.reduce((s,c) => s + (c.providers||0), 0);
  const tr = chains.reduce((s,c) => s + (c.fallback_rules||0), 0);
  el.innerHTML = `
    <div class="page-header"><div><h1 class="page-title">Dashboard</h1><div class="page-subtitle">Monitor your fallback chains at a glance</div></div></div>
    <div class="stats">
      <div class="stat-card"><div class="stat-value">${tc}</div><div class="stat-label">Chains</div></div>
      <div class="stat-card"><div class="stat-value">${tp}</div><div class="stat-label">Providers</div></div>
      <div class="stat-card"><div class="stat-value">${tr}</div><div class="stat-label">Fallback Rules</div></div>
      <div class="stat-card"><div class="stat-value" style="color:var(--success)">\u25CF</div><div class="stat-label">API Status</div></div>
    </div>
    <div class="card">
      <div class="card-title"><span>\u{1F517}</span> Recent Chains</div>
      ${tc === 0 ? '<div class="empty-state"><div class="icon">\u{1F517}</div><div class="title">No chains yet</div><div class="desc">Create your first fallback chain to get started</div><button class="btn btn-primary" onclick="navigateTo(\'chains\')">+ Create Chain</button></div>' : `
      <div class="table-wrap"><table>
        <thead><tr><th>Name</th><th>Providers</th><th>Rules</th><th>ID</th></tr></thead>
        <tbody>${chains.map(c => `<tr style="cursor:pointer" onclick="selectedChainId='${c.chain_id}';navigateTo('chains')"><td>${escapeHtml(c.name)}</td><td><span class="badge badge-primary">${c.providers||0}</span></td><td><span class="badge badge-info">${c.fallback_rules||0}</span></td><td><span class="mono">${c.chain_id.substring(0,8)}\u2026</span></td></tr>`).join('')}</tbody>
      </table></div>`}
    </div>`;
}

function renderChains(el) {
  el.innerHTML = `
    <div class="page-header"><div><h1 class="page-title">Chains</h1><div class="page-subtitle">${chains.length} chain${chains.length!==1?'s':''} configured</div></div><button class="btn btn-primary" onclick="showCreateChainModal()">+ New Chain</button></div>
    <div id="chainsList"></div>`;
  renderChainsList();
}

async function renderChainsList() {
  const c = document.getElementById('chainsList');
  if (!c) return;
  if (chains.length === 0) {
    c.innerHTML = '<div class="empty-state"><div class="icon">\u{1F517}</div><div class="title">No chains yet</div><div class="desc">Create your first fallback chain to configure provider failover</div><button class="btn btn-primary" onclick="showCreateChainModal()">+ Create Chain</button></div>';
    return;
  }
  c.innerHTML = chains.map(ch => `
    <div class="chain-card" onclick="viewChain('${ch.chain_id}')">
      <div class="chain-card-header">
        <div><div class="chain-card-title">${escapeHtml(ch.name)}</div></div>
        <div class="chain-card-actions">
          <button class="btn btn-icon" title="Test" onclick="event.stopPropagation();navigateToTest('${ch.chain_id}')">\u{1F9EA}</button>
          <button class="btn btn-icon" title="Delete" onclick="event.stopPropagation();deleteChain('${ch.chain_id}','${escapeHtml(ch.name)}')">\u{1F5D1}</button>
        </div>
      </div>
      <div class="chain-card-meta">
        <span><span class="badge badge-primary">${ch.providers||0} providers</span></span>
        <span><span class="badge badge-info">${ch.fallback_rules||0} rules</span></span>
        <span class="mono">${ch.chain_id.substring(0,8)}\u2026</span>
      </div>
    </div>
  `).join('');
}

function navigateToTest(chainId) { selectedChainId = chainId; navigateTo('test'); }

function showCreateChainModal() {
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal">
      <div class="modal-title">Create New Chain</div>
      <div class="form-group"><label class="form-label">Chain Name</label><input class="form-input" id="newChainName" placeholder="e.g. production-gpt-fallback" autofocus></div>
      <div class="form-group"><label class="form-label">Providers (JSON array)</label><textarea class="form-input" id="newChainProviders" placeholder='[{"name":"GPT-4","model_id":"gpt-4","api_base":"https://api.openai.com/v1","priority":0},{"name":"Claude","model_id":"claude-3-sonnet","api_base":"https://api.anthropic.com","priority":1}]'></textarea></div>
      <div class="form-group"><label class="form-label">Fallback Rules (JSON, optional)</label><textarea class="form-input" id="newChainRules" placeholder='[]'></textarea></div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button class="btn btn-primary" onclick="createChain()">Create Chain</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
}

async function createChain() {
  const name = document.getElementById('newChainName').value.trim();
  let providers, rules;
  try { providers = JSON.parse(document.getElementById('newChainProviders').value); } catch { providers = []; }
  try { rules = JSON.parse(document.getElementById('newChainRules').value || '[]'); } catch { rules = []; }
  if (!name) { showToast('Chain name is required', 'error'); return; }
  if (!providers.length) providers = [{name:'Primary',model_id:'gpt-4',api_base:'https://api.openai.com/v1',priority:0}];
  try {
    await api('/chains', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name,providers,fallback_rules:rules}) });
    showToast('Chain created successfully', 'success');
    document.querySelector('.modal-overlay').remove();
    await loadChains();
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

async function viewChain(id) {
  try {
    const chain = await api(`/chains/${id}`);
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `
      <div class="modal">
        <div class="modal-title">${escapeHtml(chain.name)}</div>
        <div class="card-title"><span>\u{1F310}</span> Providers</div>
        <div class="table-wrap"><table>
          <thead><tr><th>Name</th><th>Model</th><th>Priority</th><th>API Base</th></tr></thead>
          <tbody>${(chain.providers||[]).map(p => `<tr><td>${escapeHtml(p.name)}</td><td>${escapeHtml(p.model_id)}</td><td><span class="badge badge-primary">${p.priority}</span></td><td><span class="mono">${escapeHtml(p.api_base||'default')}</span></td></tr>`).join('')}</tbody>
        </table></div>
        ${chain.fallback_rules && chain.fallback_rules.length ? `<div class="card-title" style="margin-top:20px"><span>\u{2699}</span> Fallback Rules</div><pre style="font-size:12px;color:var(--text-secondary);background:var(--bg);padding:16px;border-radius:var(--radius-sm);overflow:auto">${escapeHtml(JSON.stringify(chain.fallback_rules, null, 2))}</pre>` : ''}
        <div class="modal-actions">
          <button class="btn btn-outline" onclick="navigateToTest('${id}')">Run Test</button>
          <button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">Close</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
    modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

async function deleteChain(id, name) {
  if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
  try { await api(`/chains/${id}`, {method:'DELETE'}); showToast('Chain deleted', 'success'); await loadChains(); } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

function renderTest(el) {
  el.innerHTML = `
    <div class="page-header"><div><h1 class="page-title">Test Runner</h1><div class="page-subtitle">Run fallback simulations against your chains</div></div></div>
    <div class="card">
      <div class="card-title"><span>\u{1F9EA}</span> Configure Test</div>
      <div class="form-group"><label class="form-label">Select Chain</label>
        <select class="form-input" id="testChainId">
          <option value="">-- Select a chain --</option>
          ${chains.map(c => `<option value="${c.chain_id}" ${selectedChainId===c.chain_id?'selected':''}>${escapeHtml(c.name)}</option>`).join('')}
        </select>
      </div>
      <div class="form-group"><label class="form-label">Number of Prompts</label><input class="form-input" id="testPromptCount" type="number" value="5" min="1" max="100"></div>
      <button class="btn btn-primary" onclick="runTest()">Run Test</button>
    </div>
    <div id="testOutput" style="display:none;">
      <div class="card"><div class="card-title"><span>\u{1F4CA}</span> Test Progress</div>
        <div class="progress-bar" style="margin-bottom:12px"><div class="progress-fill" id="testProgress" style="width:0%"></div></div>
        <div class="test-log" id="testLog"></div>
      </div>
    </div>
    <div id="testResults" style="display:none;"></div>`;
}

async function runTest() {
  const chainId = document.getElementById('testChainId').value;
  const count = parseInt(document.getElementById('testPromptCount').value) || 5;
  if (!chainId) { showToast('Select a chain first', 'error'); return; }
  document.getElementById('testOutput').style.display = 'block';
  document.getElementById('testResults').style.display = 'none';
  document.getElementById('testProgress').style.width = '0%';
  document.getElementById('testLog').innerHTML = '';
  appendTestLog({current:0,total:count,provider:'-',success:true,latency_ms:0}, true);
  try {
    const result = await api(`/chains/${chainId}/test`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({prompts:count})});
    showTestResults(result);
    showToast('Test completed', 'success');
  } catch (e) { appendTestLog({error:e.message}, false, true); showToast('Test failed: ' + e.message, 'error'); }
}

function appendTestLog(data, isStart=false, isError=false) {
  const log = document.getElementById('testLog'); if (!log) return;
  if (isStart) { log.innerHTML += `<div class="info">\u{1F680} Starting test: ${data.total} prompts</div>`; return; }
  if (isError) { log.innerHTML += `<div class="fail">\u274C Error: ${escapeHtml(data.error)}</div>`; return; }
  const pct = data.total > 0 ? Math.round((data.current/data.total)*100) : 0;
  document.getElementById('testProgress').style.width = pct + '%';
  const cls = data.success ? 'success' : 'fail';
  const icon = data.success ? '\u2705' : '\u274C';
  log.innerHTML += `<div class="${cls}">${icon} [${data.current}/${data.total}] ${escapeHtml(data.provider||'-')} \u2014 ${data.latency_ms.toFixed(0)}ms</div>`;
  log.scrollTop = log.scrollHeight;
}

function showTestComplete(data) {
  const log = document.getElementById('testLog'); if (!log) return;
  log.innerHTML += `<div class="info">\u{1F3C1} Complete: ${data.successful}/${data.total} successful</div>`;
  document.getElementById('testProgress').style.width = '100%';
}

function showTestResults(report) {
  const el = document.getElementById('testResults'); el.style.display = 'block';
  const successRate = report.results ? (report.results.filter(r => r.success).length / report.results.length * 100).toFixed(1) : '\u2014';
  const avgLatency = report.results && report.results.length ? (report.results.reduce((s,r) => s + (r.latency_ms||0), 0) / report.results.length).toFixed(0) : '\u2014';
  el.innerHTML = `
    <div class="card">
      <div class="card-title"><span>\u{1F4CA}</span> Results</div>
      <div class="stats" style="margin-bottom:16px">
        <div class="stat-card"><div class="stat-value" style="color:var(--success)">${successRate}%</div><div class="stat-label">Success Rate</div></div>
        <div class="stat-card"><div class="stat-value">${report.results ? report.results.length : 0}</div><div class="stat-label">Prompts</div></div>
        <div class="stat-card"><div class="stat-value">${avgLatency}ms</div><div class="stat-label">Avg Latency</div></div>
      </div>
      <div class="table-wrap"><table>
        <thead><tr><th>#</th><th>Provider</th><th>Status</th><th>Latency</th><th>Retries</th></tr></thead>
        <tbody>${(report.results||[]).map((r,i) => `<tr>
          <td>${i+1}</td><td>${escapeHtml(r.provider||'\u2014')}</td>
          <td><span class="badge ${r.success?'badge-success':'badge-danger'}">${r.success?'OK':'FAIL'}</span></td>
          <td>${(r.latency_ms||0).toFixed(0)}ms</td>
          <td>${r.retries_used ?? '\u2014'}</td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>`;
}

function renderExport(el) {
  el.innerHTML = `
    <div class="page-header"><div><h1 class="page-title">Export</h1><div class="page-subtitle">Export chain configs for your framework</div></div></div>
    <div class="card">
      <div class="card-title"><span>\u{1F4E6}</span> Export Chain Config</div>
      <div class="form-group"><label class="form-label">Select Chain</label>
        <select class="form-input" id="exportChainId">
          <option value="">-- Select a chain --</option>
          ${chains.map(c => `<option value="${c.chain_id}">${escapeHtml(c.name)}</option>`).join('')}
        </select>
      </div>
      <div class="form-group"><label class="form-label">Format</label>
        <select class="form-input" id="exportFormat">
          <option value="custom">Custom</option>
          <option value="litellm">LiteLLM</option>
          <option value="openrouter">OpenRouter</option>
          <option value="langchain">LangChain</option>
          <option value="haystack">Haystack</option>
        </select>
      </div>
      <button class="btn btn-primary" onclick="exportChain()">Export</button>
      <pre id="exportOutput" class="export-output" style="display:none"></pre></div>
  `;
}

async function exportChain() {
  const chainId = document.getElementById('exportChainId').value;
  const fmt = document.getElementById('exportFormat').value;
  if (!chainId) { showToast('Select a chain first', 'error'); return; }
  try {
    const result = await api(`/chains/${chainId}/export`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({format:fmt})});
    const output = document.getElementById('exportOutput');
    output.style.display = 'block';
    output.textContent = JSON.stringify(result, null, 2);
    showToast('Config exported', 'success');
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

// ── Init ──
loadChains();
connectWS();
</script>
</body>
</html>
