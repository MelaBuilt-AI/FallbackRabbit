name: example-chain
providers:
  - name: GPT-4o
    model_id: gpt-4o
    api_base: https://api.openai.com/v1
    priority: 0
    max_tokens: 4096
    timeout: 30
    metadata:
      provider_type: openai
  - name: Claude Sonnet
    model_id: claude-sonnet-4-20250514
    api_base: https://api.anthropic.com/v1
    priority: 1
    max_tokens: 4096
    timeout: 30
    metadata:
      provider_type: anthropic
  - name: Local Llama
    model_id: llama3
    api_base: http://localhost:11434/v1
    priority: 2
    max_tokens: 2048
    timeout: 60
    metadata:
      provider_type: ollama

fallback_rules:
  - condition_error_type: rate_limit
    action: wait
    wait_seconds: 5
    retry_count: 3
  - condition_error_type: timeout
    action: failover
  - condition_error_type: server_error
    condition_status_codes: [500, 502, 503]
    action: failover
  - condition_error_type: connection_error
    action: failover

metadata:
  description: "Example 3-provider fallback chain: GPT-4o → Claude Sonnet → Local Llama"